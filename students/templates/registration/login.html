<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px 35px;
            max-width: 450px;
            width: 90%;
            animation: slideUp 0.5s ease;
        }
        
        @media (max-width: 768px) {
            .login-container {
                padding: 35px 30px;
                width: 85%;
            }
            
            .logo-icon {
                font-size: 50px;
            }
            
            .login-title {
                font-size: 22px;
            }
            
            .login-subtitle {
                font-size: 13px;
            }
        }
        
        @media (max-width: 576px) {
            .login-container {
                padding: 30px 25px;
                width: 90%;
                margin: 20px;
            }
            
            .logo-icon {
                font-size: 45px;
            }
            
            .login-title {
                font-size: 20px;
            }
            
            .login-subtitle {
                font-size: 12px;
            }
            
            .form-control {
                padding: 10px 15px;
                font-size: 14px;
            }
            
            .btn-login {
                padding: 12px;
                font-size: 15px;
            }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 60px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }
        
        .login-title {
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .form-label {
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        
        .form-control {
            border-radius: 10px;
            border: 2px solid #ddd;
            padding: 12px 20px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group-text {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 10px 0 0 10px;
        }
        
        .input-group .form-control {
            border-radius: 0 10px 10px 0;
        }
        
        .btn-login {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            width: 100%;
            color: white;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        
        .alert-danger {
            border-radius: 10px;
            border: none;
            background: #fee;
            color: #c0392b;
            padding: 12px 20px;
            margin-bottom: 20px;
        }
        
        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #95a5a6;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <i class="fas fa-graduation-cap logo-icon"></i>
            <h2 class="login-title">Student Management System</h2>
            <p class="login-subtitle">Sign in to access your dashboard</p>
        </div>

        <!-- Login Form -->
        <form method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-triangle"></i> Invalid username or password. Please try again.
            </div>
            {% endif %}
            
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-user"></i>
                </span>
                <input type="text" name="username" class="form-control" id="id_username" 
                       placeholder="Username" required autofocus autocomplete="username">
            </div>
            
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-lock"></i>
                </span>
                <input type="password" name="password" class="form-control" id="id_password" 
                       placeholder="Password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        
        <div class="footer-text">
            <i class="fas fa-shield-alt"></i> Secure authentication system
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
